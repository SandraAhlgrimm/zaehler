<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betriebsratswahl – Zähler App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      color: #fff;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* ── Belegschaft ── */
    .workforce {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 1.2rem 2rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .workforce label {
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .workforce input[type=number] {
      width: 70px;
      padding: 0.4rem 0.5rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.95rem;
      text-align: center;
    }

    .workforce .info {
      font-size: 0.85rem;
      opacity: 0.7;
      width: 100%;
      text-align: center;
    }

    /* ── Counter cards ── */
    .counters {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .counter-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.5rem;
      width: 280px;
      text-align: center;
      transition: transform 0.2s;
      position: relative;
    }

    .counter-card:hover { transform: translateY(-4px); }

    .card-label {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      letter-spacing: 1px;
    }

    .count {
      font-size: 3.5rem;
      font-weight: 700;
      margin: 0.5rem 0;
      font-variant-numeric: tabular-nums;
      transition: transform 0.1s;
    }

    .count.pop { transform: scale(1.2); }

    .buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0.6rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      color: #fff;
    }

    button:active { transform: scale(0.92); }

    button.reset {
      background: rgba(255, 255, 255, 0.12);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      margin-top: 0.5rem;
    }

    button.reset:hover { background: rgba(255,255,255,0.2); }

    .count-input {
      width: 80px;
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      text-align: center;
      margin-top: 0.3rem;
    }

    .btn-remove-list {
      position: absolute;
      top: 8px;
      right: 10px;
      background: rgba(255,255,255,0.1);
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border-radius: 8px;
      opacity: 0.5;
    }

    .btn-remove-list:hover { opacity: 1; background: #ef4444; }

    /* ── Add list button ── */
    .add-list-card {
      background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 20px;
      width: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .add-list-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.3);
    }

    .add-list-card button {
      background: none;
      font-size: 1rem;
      opacity: 0.6;
      padding: 1rem 1.5rem;
    }

    .add-list-card button:hover { opacity: 1; }

    /* ── Name lists ── */
    .name-list-section {
      margin-top: 1rem;
      text-align: left;
    }

    .name-list-section h3 {
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      opacity: 0.8;
    }

    .name-list-section textarea {
      width: 100%;
      min-height: 110px;
      padding: 0.6rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      resize: vertical;
      line-height: 1.6;
    }

    .name-list-section textarea::placeholder { color: rgba(255,255,255,0.3); }

    .name-list-section .hint {
      font-size: 0.72rem;
      opacity: 0.5;
      margin-top: 0.3rem;
    }

    /* ── Results ── */
    .results {
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      text-align: center;
      width: 100%;
      max-width: 750px;
    }

    .results h2 {
      font-size: 1.05rem;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
      opacity: 0.85;
    }

    .minority-info {
      font-size: 0.85rem;
      margin-bottom: 1rem;
      padding: 0.6rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }

    .minority-info .highlight { color: #fbbf24; font-weight: 600; }

    .seats-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1rem 0;
    }

    .seat {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.7rem;
      transition: background 0.3s;
    }

    .seat.empty { background: rgba(255,255,255,0.1); }

    .seats-summary {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }

    /* ── Elected list ── */
    .elected-list {
      margin-top: 1.2rem;
      text-align: left;
    }

    .elected-list h3 {
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      text-align: center;
      opacity: 0.85;
    }

    .elected-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .elected-table th, .elected-table td {
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.12);
      text-align: left;
    }

    .elected-table th {
      opacity: 0.7;
      font-weight: 600;
      text-align: center;
    }

    .elected-table tr.swapped { background: rgba(251,191,36,0.12); }
    .elected-table .swap-note { color: #fbbf24; font-size: 0.75rem; }

    /* ── d'Hondt table ── */
    table.dhondt {
      margin: 1rem auto 0;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    table.dhondt th, table.dhondt td {
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      text-align: center;
    }

    table.dhondt th { opacity: 0.7; font-weight: 600; }
    table.dhondt td.winner { font-weight: 700; }
  </style>
</head>
<body>

  <h1>🗳️ Betriebsratswahl – Zähler</h1>

  <!-- Belegschaft -->
  <div class="workforce">
    <label>👨 Männliche Beschäftigte:
      <input type="number" id="wf-m" min="0" value="0" oninput="renderAll()">
    </label>
    <label>👩 Weibliche Beschäftigte:
      <input type="number" id="wf-w" min="0" value="0" oninput="renderAll()">
    </label>
    <div class="info" id="wf-info"></div>
  </div>

  <!-- Zähler + Namenslisten (dynamisch) -->
  <div class="counters" id="counters-container"></div>

  <!-- Ergebnisse -->
  <div class="results" id="results">
    <h2>Sitzverteilung (9 Sitze · d'Hondt)</h2>
    <div class="minority-info" id="minority-info"></div>
    <div class="seats-row" id="seats-row"></div>
    <div class="seats-summary" id="seats-summary"></div>
    <div class="elected-list" id="elected-list"></div>
    <table class="dhondt" id="dhondt-table"></table>
  </div>

  <script>
    const TOTAL_SEATS = 9;

    // Farben-Palette für Listen
    const COLORS = [
      { main: '#6366f1', dark: '#4338ca', shadow: 'rgba(99,102,241,0.3)',  text: '#818cf8' },
      { main: '#ec4899', dark: '#be185d', shadow: 'rgba(236,72,153,0.3)',  text: '#f472b6' },
      { main: '#10b981', dark: '#047857', shadow: 'rgba(16,185,129,0.3)',  text: '#34d399' },
      { main: '#f59e0b', dark: '#b45309', shadow: 'rgba(245,158,11,0.3)',  text: '#fbbf24' },
      { main: '#8b5cf6', dark: '#6d28d9', shadow: 'rgba(139,92,246,0.3)', text: '#a78bfa' },
      { main: '#ef4444', dark: '#b91c1c', shadow: 'rgba(239,68,68,0.3)',   text: '#f87171' },
      { main: '#06b6d4', dark: '#0e7490', shadow: 'rgba(6,182,212,0.3)',   text: '#22d3ee' },
      { main: '#84cc16', dark: '#4d7c0f', shadow: 'rgba(132,204,22,0.3)',  text: '#a3e635' },
    ];

    let lists = [
      { id: 0, votes: 0, names: '' },
      { id: 1, votes: 0, names: '' },
    ];
    let nextId = 2;

    function getColor(idx) {
      return COLORS[idx % COLORS.length];
    }

    function addList() {
      lists.push({ id: nextId++, votes: 0, names: '' });
      rebuildCards();
      renderAll();
    }

    function removeList(id) {
      if (lists.length <= 2) return;
      lists = lists.filter(l => l.id !== id);
      rebuildCards();
      renderAll();
    }

    function saveNamesFromDOM() {
      for (const l of lists) {
        const ta = document.getElementById('names-' + l.id);
        if (ta) l.names = ta.value;
      }
    }

    function rebuildCards() {
      saveNamesFromDOM();
      const container = document.getElementById('counters-container');
      let html = '';

      lists.forEach((l, idx) => {
        const c = getColor(idx);
        const nr = idx + 1;
        const removeBtn = lists.length > 2
          ? `<button class="btn-remove-list" onclick="removeList(${l.id})" title="Liste entfernen">✕</button>`
          : '';

        html += `
          <div class="counter-card" style="box-shadow: 0 8px 32px ${c.shadow};">
            ${removeBtn}
            <div class="card-label" style="color:${c.text}">Liste ${nr}</div>
            <div class="count" id="count-${l.id}">${l.votes}</div>
            <div class="buttons">
              <button class="minus" style="background:${c.dark}" onclick="updateVote(${l.id}, -1)">−</button>
              <button class="plus"  style="background:${c.main}" onclick="updateVote(${l.id}, +1)">+</button>
            </div>
            <button class="reset" onclick="resetVote(${l.id})">Zurücksetzen</button>
            <input type="number" class="count-input" id="input-${l.id}" min="0" value="${l.votes}" oninput="setVote(${l.id}, this.value)">
            <div class="name-list-section">
              <h3>Kandidat:innen (Listenplatz-Reihenfolge)</h3>
              <textarea id="names-${l.id}" oninput="renderAll()"
                placeholder="Anna Schmidt, w&#10;Max Müller, m&#10;Lena Meier, w&#10;…">${l.names}</textarea>
              <div class="hint">Format: Name, m oder w (pro Zeile)</div>
            </div>
          </div>`;
      });

      html += `
        <div class="add-list-card" onclick="addList()">
          <button>＋ Liste hinzufügen</button>
        </div>`;

      container.innerHTML = html;
    }

    function getList(id) { return lists.find(l => l.id === id); }

    function updateVote(id, delta) {
      const l = getList(id);
      l.votes = Math.max(0, l.votes + delta);
      syncDisplay(id);
      renderAll();
    }

    function resetVote(id) {
      getList(id).votes = 0;
      syncDisplay(id);
      renderAll();
    }

    function setVote(id, val) {
      getList(id).votes = Math.max(0, parseInt(val) || 0);
      document.getElementById('count-' + id).textContent = getList(id).votes;
      renderAll();
    }

    function syncDisplay(id) {
      const l = getList(id);
      const el = document.getElementById('count-' + id);
      el.textContent = l.votes;
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 120);
      document.getElementById('input-' + id).value = l.votes;
    }

    function parseCandidates(id) {
      const el = document.getElementById('names-' + id);
      if (!el) return [];
      return el.value.split('\n')
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => {
          const match = line.match(/^(.+?),\s*(m|w|d)\s*$/i);
          if (!match) return null;
          return { name: match[1].trim(), gender: match[2].toLowerCase() };
        })
        .filter(c => c !== null);
    }

    function getMinoritySeatCount() {
      const m = parseInt(document.getElementById('wf-m').value) || 0;
      const w = parseInt(document.getElementById('wf-w').value) || 0;
      const total = m + w;
      if (total === 0) return { minGender: null, minSeats: 0, m, w, total };

      let minGender, minCount;
      if (m < w) { minGender = 'm'; minCount = m; }
      else if (w < m) { minGender = 'w'; minCount = w; }
      else { minGender = null; minCount = 0; }

      const minSeats = minGender ? Math.round((minCount / total) * TOTAL_SEATS) : 0;
      return { minGender, minSeats, m, w, total };
    }

    function dhondt(listsData, seats) {
      const seatCounts = listsData.map(() => 0);
      const rounds = [];

      for (let r = 0; r < seats; r++) {
        const quotients = listsData.map((l, i) => l.votes / (seatCounts[i] + 1));
        let maxQ = -1, winnerIdx = 0;
        quotients.forEach((q, i) => {
          if (q > maxQ || (q === maxQ && seatCounts[i] < seatCounts[winnerIdx])) {
            maxQ = q;
            winnerIdx = i;
          }
        });
        seatCounts[winnerIdx]++;
        rounds.push({ quotients: [...quotients], winnerIdx });
      }
      return { seatCounts, rounds };
    }

    function allocateSeats(seatCounts, allCandidates, minorityInfo) {
      let elected = [];
      seatCounts.forEach((count, listIdx) => {
        const candidates = allCandidates[listIdx];
        for (let i = 0; i < count; i++) {
          elected.push({
            listIdx,
            candidate: candidates[i] || { name: `Listenplatz ${i+1}`, gender: '?' },
            seatIndex: i,
            swapped: false
          });
        }
      });

      if (!minorityInfo.minGender || minorityInfo.minSeats === 0) {
        return { elected, adjustments: 0 };
      }

      const mg = minorityInfo.minGender;
      let mgSeated = elected.filter(e => e.candidate.gender === mg).length;
      let adjustments = 0;

      while (mgSeated < minorityInfo.minSeats) {
        let swapTarget = null, maxIdx = -1;
        for (const e of elected) {
          if (!e.swapped && e.candidate.gender !== mg && e.candidate.gender !== '?') {
            if (e.seatIndex >= maxIdx) {
              maxIdx = e.seatIndex;
              swapTarget = e;
            }
          }
        }
        if (!swapTarget) break;

        const candidates = allCandidates[swapTarget.listIdx];
        const alreadyElected = new Set(
          elected.filter(e => e.listIdx === swapTarget.listIdx).map(e => e.seatIndex)
        );

        let replacement = null;
        for (let i = 0; i < candidates.length; i++) {
          if (!alreadyElected.has(i) && candidates[i].gender === mg) {
            replacement = { index: i, candidate: candidates[i] };
            break;
          }
        }
        if (!replacement) break;

        swapTarget.candidate = replacement.candidate;
        swapTarget.seatIndex = replacement.index;
        swapTarget.swapped = true;
        adjustments++;
        mgSeated++;
      }

      return { elected, adjustments };
    }

    function renderAll() {
      const totalVotes = lists.reduce((s, l) => s + l.votes, 0);
      const noVotes = totalVotes === 0;
      const allCandidates = lists.map(l => parseCandidates(l.id));
      const minorityInfo = getMinoritySeatCount();

      // Workforce info
      const wfInfo = document.getElementById('wf-info');
      if (minorityInfo.total > 0 && minorityInfo.minGender) {
        const pct = ((minorityInfo.minGender === 'm' ? minorityInfo.m : minorityInfo.w) / minorityInfo.total * 100).toFixed(1);
        const label = minorityInfo.minGender === 'm' ? 'Männer' : 'Frauen';
        wfInfo.innerHTML = `Minderheitengeschlecht: <span style="color:#fbbf24;font-weight:600">${label} (${pct}%)</span> → mind. <span style="color:#fbbf24;font-weight:600">${minorityInfo.minSeats} von ${TOTAL_SEATS} Sitzen</span>`;
      } else if (minorityInfo.total > 0) {
        wfInfo.textContent = 'Geschlechterverteilung ist ausgeglichen – keine Minderheitenregelung nötig.';
      } else {
        wfInfo.textContent = 'Belegschaftszahlen eingeben für Minderheitengeschlechterregelung (§15 Abs. 2 BetrVG)';
      }

      // d'Hondt
      const dhondtData = dhondt(lists, TOTAL_SEATS);
      const { elected, adjustments } = allocateSeats(dhondtData.seatCounts, allCandidates, minorityInfo);

      // Minority info box
      const miBox = document.getElementById('minority-info');
      if (noVotes) {
        miBox.innerHTML = '';
      } else if (adjustments > 0) {
        miBox.innerHTML = `⚠️ <span class="highlight">${adjustments} Nachrücker-Tausch</span> für Minderheitengeschlechterregelung`;
      } else if (minorityInfo.minGender && minorityInfo.minSeats > 0) {
        const mgSeated = elected.filter(e => e.candidate.gender === minorityInfo.minGender).length;
        miBox.innerHTML = `✅ Minderheitengeschlecht hat <span class="highlight">${mgSeated} Sitze</span> (Minimum: ${minorityInfo.minSeats}) – Regelung erfüllt`;
      } else {
        miBox.innerHTML = '';
      }

      // Seat circles
      const seatsRow = document.getElementById('seats-row');
      let sHtml = '';
      if (noVotes) {
        for (let i = 0; i < TOTAL_SEATS; i++) sHtml += '<div class="seat empty"></div>';
      } else {
        for (const e of elected) {
          const c = getColor(e.listIdx);
          const g = e.candidate.gender === 'm' ? '♂' : e.candidate.gender === 'w' ? '♀' : '';
          sHtml += `<div class="seat" style="background:${c.main}" title="${e.candidate.name}">${g}</div>`;
        }
      }
      seatsRow.innerHTML = sHtml;

      // Summary
      const summary = document.getElementById('seats-summary');
      if (noVotes) {
        summary.innerHTML = '<span style="opacity:0.5">Stimmen eingeben …</span>';
      } else {
        summary.innerHTML = lists.map((l, idx) => {
          const c = getColor(idx);
          return `<span style="color:${c.text}">Liste ${idx+1}: <strong>${dhondtData.seatCounts[idx]}</strong> Sitze</span>`;
        }).join('');
      }

      // Elected table
      const elDiv = document.getElementById('elected-list');
      const hasCandidates = allCandidates.some(c => c.length > 0);
      if (noVotes || !hasCandidates) {
        elDiv.innerHTML = '';
      } else {
        let tbl = '<h3>Gewählte Betriebsratsmitglieder</h3>';
        tbl += '<table class="elected-table"><tr><th>#</th><th>Name</th><th>Geschl.</th><th>Liste</th><th></th></tr>';
        elected.forEach((e, i) => {
          const cls = e.swapped ? ' class="swapped"' : '';
          const c = getColor(e.listIdx);
          const gLabel = e.candidate.gender === 'm' ? '♂ m' : e.candidate.gender === 'w' ? '♀ w' : e.candidate.gender;
          const note = e.swapped ? '<span class="swap-note">↑ Minderheitenregelung</span>' : '';
          tbl += `<tr${cls}><td>${i+1}</td><td>${e.candidate.name}</td><td>${gLabel}</td><td style="color:${c.text}">Liste ${e.listIdx+1}</td><td>${note}</td></tr>`;
        });
        tbl += '</table>';
        elDiv.innerHTML = tbl;
      }

      // d'Hondt table
      const table = document.getElementById('dhondt-table');
      if (noVotes) { table.innerHTML = ''; return; }
      let t = '<tr><th>Runde</th>';
      lists.forEach((_, idx) => { t += `<th>Liste ${idx+1}</th>`; });
      t += '<th>Sitz →</th></tr>';
      dhondtData.rounds.forEach((r, i) => {
        t += `<tr><td>${i+1}</td>`;
        r.quotients.forEach((q, idx) => {
          const isWinner = idx === r.winnerIdx;
          const c = getColor(idx);
          const cls = isWinner ? ` class="winner" style="color:${c.text}"` : '';
          t += `<td${cls}>${q.toFixed(1)}</td>`;
        });
        const wc = getColor(r.winnerIdx);
        t += `<td class="winner" style="color:${wc.text}">Liste ${r.winnerIdx+1}</td></tr>`;
      });
      table.innerHTML = t;
    }

    // Init
    rebuildCards();
    renderAll();
  </script>

</body>
</html>
